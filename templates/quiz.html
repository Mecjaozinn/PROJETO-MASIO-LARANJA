<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Maio Laranja</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="quiz-body">

  <nav class="nav nav-dark">
    <a href="/" class="nav-logo">🟠 Maio Laranja</a>
    <a href="/ranking" class="nav-btn-sm">🏆 Ranking</a>
  </nav>

  <!-- TELA 1: Entrada do nome -->
  <div class="quiz-screen" id="screen-nome">
    <div class="quiz-card">
      <div class="quiz-badge">🟠 Quiz Maio Laranja</div>
      <h1>Quanto você<br>sabe sobre<br><em>proteção infantil?</em></h1>
      <p>5 perguntas de níveis variados. Sua pontuação vai para o ranking!</p>
      <div class="form-group">
        <label for="nome-jogador">Seu nome (opcional)</label>
        <input type="text" id="nome-jogador" placeholder="Como quer aparecer no ranking?" maxlength="30" />
      </div>
      <button class="btn btn-primary btn-full" onclick="iniciarQuiz()">Começar →</button>
      <p class="quiz-anon">Nenhum dado pessoal obrigatório.</p>
    </div>
  </div>

  <!-- TELA 2: Perguntas -->
  <div class="quiz-screen hidden" id="screen-quiz">
    <div class="quiz-card quiz-card-wide">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progress-fill"></div>
      </div>
      <p class="quiz-counter" id="quiz-counter">Pergunta 1 de 5</p>
      <div class="quiz-nivel" id="quiz-nivel"></div>
      <h2 class="quiz-pergunta" id="quiz-pergunta"></h2>
      <div class="quiz-opcoes" id="quiz-opcoes"></div>
    </div>
  </div>

  <!-- TELA 3: Resultado -->
  <div class="quiz-screen hidden" id="screen-resultado">
    <div class="quiz-card">
      <div class="resultado-emoji" id="resultado-emoji"></div>
      <h2 id="resultado-titulo"></h2>
      <div class="resultado-nota" id="resultado-nota"></div>
      <p id="resultado-tempo"></p>
      <div class="resultado-detalhes" id="resultado-detalhes"></div>
      <div class="resultado-acoes">
        <button class="btn btn-primary" onclick="location.reload()">Jogar novamente</button>
        <a href="/ranking" class="btn btn-ghost">Ver ranking 🏆</a>
      </div>
    </div>
  </div>

  <script src="/static/js/quiz.js"></script>
</body>
</html>
