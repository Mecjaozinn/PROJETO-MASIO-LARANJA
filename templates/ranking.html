<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking — Maio Laranja</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="quiz-body">

  <nav class="nav nav-dark">
    <a href="/" class="nav-logo">🟠 Maio Laranja</a>
    <a href="/quiz" class="nav-btn-sm">Jogar quiz</a>
  </nav>

  <div class="quiz-screen">
    <div class="quiz-card quiz-card-wide">
      <h1 class="ranking-title">🏆 Ranking</h1>
      <p class="ranking-sub">Os campeões da conscientização</p>
      <div id="ranking-lista">
        <p class="loading">Carregando...</p>
      </div>
      <a href="/quiz" class="btn btn-primary mt" style="display:inline-block">
        Jogar e entrar no ranking →
      </a>
    </div>
  </div>

  <script>
    async function carregarRanking() {
      const res   = await fetch("/api/ranking");
      const dados = await res.json();
      const lista = document.getElementById("ranking-lista");

      if (dados.length === 0) {
        lista.innerHTML = '<p class="loading">Ainda não há jogadores. Seja o primeiro!</p>';
        return;
      }

      const medalhas = ["🥇", "🥈", "🥉"];
      lista.innerHTML = dados.map((j, i) => `
        <div class="ranking-row ${i < 3 ? 'ranking-top' : ''}">
          <span class="ranking-pos">${medalhas[i] || (i + 1) + "º"}</span>
          <span class="ranking-nome">${j.nome}</span>
          <span class="ranking-nota">${j.nota}/5</span>
          <span class="ranking-tempo">${j.tempo.toFixed(2)}s</span>
        </div>
      `).join("");
    }
    carregarRanking();
  </script>
</body>
</html>
